# costmap_common_params.yaml
obstacle_range: 2.5
raytrace_range: 10.0
footprint: [[0.175, 0.175], [0.175, -0.175], [-0.175, -0.175], [-0.175, 0.175]]
#footprint_inflation: 0.01
robot_radius: 0.4
inflation_radius: 0.5
cost_scaling_factor: 8.0

lethal_cost_threshold: 1

map_type: costmap
#transform_tolerance: 1
observation_sources: scan virtual_obstacles
scan: {data_type: LaserScan, topic: smart_car/scan, marking: true, clearing: true}

# 显式设置 observation_sources，覆盖 my_smart_car 的配置
obstacle_layer:
  enabled: true
  combination_method: 1
  observation_sources: scan virtual_obstacles  # 使用 scan（已有的）和 virtual_obstacles

  scan:
    data_type: LaserScan
    topic: smart_car/scan
    marking: true
    clearing: true

  virtual_obstacles:
    data_type: LaserScan
    topic: virtual_obstacle_scan
    marking: true
    clearing: true
    obstacle_keep_time: 0.5
    transform_tolerance: 0.3
